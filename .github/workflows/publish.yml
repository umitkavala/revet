name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── crates.io ──────────────────────────────────────────────────────────────

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Publish revet-core
        run: cargo publish -p revet-core || echo "Already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for revet-core to be available
        run: sleep 30

      - name: Publish revet
        run: cargo publish -p revet || echo "Already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── Build NAPI binding + CLI binary per platform ───────────────────────────

  build-npm:
    name: Build (${{ matrix.settings.label }})
    strategy:
      fail-fast: false
      matrix:
        settings:
          - label: linux-x64-gnu
            host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: revet-linux-x64
            exe_suffix: ''

          - label: linux-arm64-gnu
            host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            setup: sudo apt-get install -y gcc-aarch64-linux-gnu
            binary_name: revet-linux-arm64
            exe_suffix: ''

          - label: darwin-x64
            host: macos-latest
            target: x86_64-apple-darwin
            binary_name: revet-darwin-x64
            exe_suffix: ''

          - label: darwin-arm64
            host: macos-latest
            target: aarch64-apple-darwin
            binary_name: revet-darwin-arm64
            exe_suffix: ''

          - label: win32-x64-msvc
            host: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: revet-windows-x64.exe
            exe_suffix: '.exe'

    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.settings.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.settings.target }}-cargo-

      - name: Cross-compile setup
        if: matrix.settings.setup
        run: ${{ matrix.settings.setup }}

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli

      - name: Build NAPI binding
        run: napi build --platform --release --target ${{ matrix.settings.target }}
        working-directory: crates/node-binding

      - name: Build revet CLI binary
        run: cargo build --release --bin revet --target ${{ matrix.settings.target }}

      - name: Stage CLI binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: cp target/${{ matrix.settings.target }}/release/revet ${{ matrix.settings.binary_name }}

      - name: Stage CLI binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item target/${{ matrix.settings.target }}/release/revet.exe ${{ matrix.settings.binary_name }}

      - name: Upload NAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: binding-${{ matrix.settings.label }}
          path: crates/node-binding/*.node
          if-no-files-found: error

      - name: Upload CLI binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: revet-cli-${{ matrix.settings.label }}
          path: ${{ matrix.settings.binary_name }}
          if-no-files-found: error

  # ── npm — publish ──────────────────────────────────────────────────────────

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-npm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download NAPI platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binding-*
          path: crates/node-binding/artifacts
          merge-multiple: false

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli

      - name: Arrange artifacts
        run: napi artifacts --output-dir artifacts --npm-dir .
        working-directory: crates/node-binding

      - name: Publish platform packages
        run: |
          for dir in linux-x64-gnu linux-arm64-gnu darwin-x64 darwin-arm64 win32-x64-msvc; do
            cd $dir && npm publish --access public || echo "Already published $dir, skipping"
            cd ..
          done
        working-directory: crates/node-binding
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: npm publish --access public || echo "Already published, skipping"
        working-directory: crates/node-binding
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── GitHub Release — attach pre-built CLI binaries ─────────────────────────

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-npm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all CLI binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: revet-cli-*
          path: release-binaries
          merge-multiple: true

      - name: Create or update GitHub Release with binaries
        run: |
          if gh release view "${{ github.ref_name }}" > /dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" release-binaries/* --clobber
          else
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --generate-notes \
              --verify-tag \
              release-binaries/*
          fi
        env:
          GH_TOKEN: ${{ github.token }}
